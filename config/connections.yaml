version: 1

# Defini tus conexiones en este archivo.
profiles:
  dev_local:
    host: localhost
    port: 5432
    database: my_database
    user: my_user
    # Recomendado: guardar password en variable de entorno.
    password_env: PGPASSWORD
    sslmode: disable

  db_server:
    # Valores sensibles/productivos via variables de entorno.
    host_env: PGHOST
    port_env: PGPORT
    database_env: PGDATABASE
    user_env: PGUSER
    password_env: PGPASSWORD
    sslmode_env: PGSSLMODE

# Opcion alternativa: usar URI completa desde variable de entorno.
# Si usas esto, prioriza connection.url_env en los archivos de fase.
# Ejemplo de URI: postgresql://user:pass@host:5432/dbname
uri_env:
  dev: PG_URI_DEV
  qa: PG_URI_QA
