version: 1
phase: sampling

connection:
  # Mismo criterio que discovery.
  profile: db_server
  # Si preferis URI desde variable, descomenta:
  # url_env: PG_URI_DEV

source:
  # Puede venir desde output de Fase 1 o desde query directa.
  inventory_path: output/inventory.csv
  # true: usa inventory_path. false: consulta candidatos directo a DB.
  use_inventory_file: true

scope:
  # REGLA IMPORTANTE:
  # - include_schemas con valores => SOLO esos schemas (lista blanca).
  # - include_schemas vacio []   => TODOS los schemas.
  # - exclude_schemas siempre resta sobre el conjunto anterior.
  include_schemas:
    []
  exclude_schemas:
    - pg_catalog
    - information_schema

  include_tables: []
  exclude_tables: []

  include_columns: []
  exclude_columns: []

column_type_filters:
  # Se recomienda mantener tipos textuales para mejor calidad semantica.
  include_data_types:
    - character varying
    - text
    - character
    - citext
  exclude_data_types: []

sampling:
  # random_non_null: toma valores no nulos y no vacios.
  method: random_non_null
  # Cantidad de ejemplos por columna.
  sample_size: 50
  # Truncado de cada valor para controlar tokens.
  max_value_length: 350
  # true: prioriza valores distintos para mejorar cobertura semantica.
  distinct_preferred: true
  # Semilla para reproducibilidad del muestreo.
  random_seed: 42

output:
  format: jsonl
  path: output/column_samples.jsonl

sql:
  list_candidates_file: sql/sampling/list_candidate_columns.sql
  random_samples_file: sql/sampling/get_random_samples.sql

runtime:
  # Cantidad de columnas procesadas por lote.
  batch_size: 100
  # Seguridad SQL: solo permite SELECT/WITH en queries de archivo.
  enforce_select_only: true
  # Fuerza sesion read-only en PostgreSQL.
  force_read_only_connection: true
  # true: reanuda usando output existente y evita reprocesar columnas ya escritas.
  resume: true
  fail_fast: true
  log_level: info
