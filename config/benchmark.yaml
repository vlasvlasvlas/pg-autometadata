version: 1
phase: benchmark

input:
  # Muestras generadas por 2.sampling.
  samples_path: output/column_samples.jsonl

prompt:
  template_path: prompts/inference_prompt.txt

context:
  # Contexto para el prompt (no es conexion real a DB).
  # Prioridad: database_env -> database -> PGDATABASE
  database_env: PGDATABASE
  database: ""

llm:
  # Para benchmark de calidad usar openai_compatible con endpoint local.
  mode: openai_compatible

  openai_compatible:
    endpoint_env: LLM_ENDPOINT
    api_key_env: LLM_API_KEY
    temperature: 0.1
    max_tokens: 400

models:
  # Lista de modelos a comparar en igualdad de prompt/contexto.
  - name: qwen2.5:14b
  - name: qwen2.5:32b

evaluation:
  # Cantidad de columnas evaluadas para comparar calidad.
  sample_limit: 100
  # random o first.
  selection_method: random
  random_seed: 42
  # Para contar baja confianza en resumen.
  low_confidence_threshold: 0.6

output:
  dir: output/benchmark
  manual_review_csv: output/benchmark/manual_review.csv
  summary_json: output/benchmark/benchmark_summary.json
  summary_csv: output/benchmark/benchmark_summary.csv

runtime:
  # true: reanuda por modelo usando predictions_*.jsonl existentes.
  resume: true
  # Si un modelo falla, usa heuristica para no cortar corrida.
  fallback_on_error: true
  fail_fast: true
